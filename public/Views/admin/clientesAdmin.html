<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | Pollos Express</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CDN (lo mantenemos para la funcionalidad) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome (como en el primer ejemplo) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/admin/admin.css">
    <link rel="stylesheet" href="../../assets/css/admin/clienteAdmin.css">

</head>

<body>
    <!--Navbar reutilizable no tocar-->
    <div class="navbar-container"></div>

    <!-- Main Content -->
    <div class="container">
        <h1>Administración de Clientes</h1>

        <div class="top-bar">
            <div style="flex-grow: 1; min-width: 200px;">
                <input type="text" id="buscarCampo" placeholder="Buscar por Nombre o CI">
            </div>
            <div style="min-width: 150px;">
                <select id="campoSeleccionado">
                    <option value="nombre">Nombre</option>
                    <option value="apellido">Apellido</option>
                    <option value="ci">CI</option>
                    <option value="telefono">Teléfono</option>
                    <option value="idDireccion">ID Dirección</option>
                </select>
            </div>
            <div>
                <button class="btn-buscar" onclick="buscarCliente()">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
            <div>
                <button class="btn-registrar" onclick="abrirModal()">
                    <i class="fas fa-plus"></i> Registrar Cliente
                </button>
            </div>
        </div>

        <table id="tablaClientes">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Teléfono</th>
                    <th>CI</th>
                    <th>Fecha Registro</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Modal -->
        <div id="modalCliente" class="modal">
            <div class="modal-content">
                <span onclick="cerrarModal()" style="font-size: 32px; cursor: pointer;">&times;</span>
                <h2>Registrar nuevo cliente</h2>
                <form id="formCliente">
                    <div class="form-group">
                        <label for="correo"><i class="fas fa-envelope"></i> Correo electrónico</label>
                        <input type="email" id="correo" placeholder="ejemplo@dominio.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contrasena"><i class="fas fa-lock"></i> Contraseña</label>
                        <input type="password" id="contrasena" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="form-group">
                        <label for="nombre"><i class="fas fa-user"></i> Nombre</label>
                        <input type="text" id="nombre" placeholder="Nombre del cliente" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido"><i class="fas fa-user-tag"></i> Apellido</label>
                        <input type="text" id="apellido" placeholder="Apellido del cliente" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono"><i class="fas fa-phone"></i> Teléfono</label>
                        <input type="text" id="telefono" placeholder="Número de teléfono" required>
                    </div>
                    <div class="form-group">
                        <label for="ci"><i class="fas fa-id-card"></i> Cédula de Identidad</label>
                        <input type="text" id="ci" placeholder="Número de CI" required>
                    </div>
                    <div class="form-group">
                        <label for="idDireccion"><i class="fas fa-map-marker-alt"></i> ID de Dirección</label>
                        <input type="number" id="idDireccion" placeholder="ID de dirección en el sistema" required>
                    </div>
                    <button type="submit" class="btn-agregar">
                        <i class="fas fa-save"></i> Agregar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts (se mantienen igual) -->
    <script>
        // Base URL de la API
        const apiUrl = "/sistema/public/api/clientes";

        // Función para cargar la tabla de clientes (GET /api/clientes)
        function cargarClientes(filtro = "") {
            fetch(apiUrl, { method: "GET" })
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector("#tablaClientes tbody");
                    tbody.innerHTML = "";

                    if (!data.data || data.data.length === 0) {
                        tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="sin-datos">
                            <i class="fas fa-database" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i><br>
                            No se encontraron clientes registrados
                        </td>
                    </tr>
                `;
                        return;
                    }

                    // Si hay filtro, lo aplicamos
                    const clientesFiltrados = data.data.filter(c => {
                        if (!filtro) return true;
                        const txt = filtro.toLowerCase();
                        return c.nombre.toLowerCase().includes(txt) ||
                            c.apellido.toLowerCase().includes(txt) ||
                            c.ci.includes(txt) ||
                            c.telefono.includes(txt);
                    });

                    if (clientesFiltrados.length === 0) {
                        tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="sin-datos">
                            <i class="fas fa-search" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i><br>
                            No se encontraron resultados para "${filtro}"
                        </td>
                    </tr>
                `;
                        return;
                    }

                    // Renderizamos cada cliente en la tabla
                    clientesFiltrados.forEach(c => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                    <td>${c.idUsuario}</td>
                    <td><input value="${c.nombre || ""}" disabled></td>
                    <td><input value="${c.apellido || ""}" disabled></td>
                    <td><input value="${c.telefono || ""}"></td>
                    <td><input value="${c.ci || ""}"></td>
                    <td>${c.fechaRegistro || ""}</td>
                    <td><input type="number" value="${c.idDireccion || ""}"></td>
                    <td class="acciones">
                        <div style="display: flex; gap: 8px;">
                            <button class="btn-actualizar" onclick="actualizarCliente(${c.idUsuario}, this)">
                                <i class="fas fa-edit"></i> Actualizar
                            </button>
                            <button class="btn-eliminar" onclick="eliminarCliente(${c.idUsuario})">
                                <i class="fas fa-trash-alt"></i> Eliminar
                            </button>
                        </div>
                    </td>
                `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => console.error("Error al cargar clientes:", err));
        }
        function cerrarSesion() {
            localStorage.removeItem("correoLogeado");
            location.href = "../../logout.php";
        }

        // Crear un nuevo cliente (POST /api/clientes)
        document.getElementById("formCliente").addEventListener("submit", function (e) {
            e.preventDefault();

            const cliente = {
                correo: this.correo.value,
                contrasena: this.contrasena.value,
                nombre: this.nombre.value,
                apellido: this.apellido.value,
                telefono: this.telefono.value,
                ci: this.ci.value,
                idDireccion: parseInt(this.idDireccion.value, 10)
            };

            fetch(apiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(cliente)
            })
                .then(res => res.json())
                .then(res => {
                    alert(res.message || res.error);
                    cargarClientes();
                    this.reset();
                    cerrarModal();
                })
                .catch(err => console.error("Error al crear cliente:", err));
        });

        // Actualizar un cliente (PUT /api/clientes)
        function actualizarCliente(idUsuario, btn) {
            const fila = btn.closest("tr");
            const telefono = fila.children[3].querySelector("input").value;
            const ci = fila.children[4].querySelector("input").value;
            const idDireccion = parseInt(fila.children[6].querySelector("input").value, 10);

            fetch(apiUrl, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idUsuario, telefono, ci, idDireccion })
            })
                .then(res => res.json())
                .then(res => {
                    alert(res.message || res.error);
                    cargarClientes();
                })
                .catch(err => console.error("Error al actualizar cliente:", err));
        }

        // Eliminar un cliente (DELETE /api/clientes)
        function eliminarCliente(idUsuario) {
            if (!confirm("¿Estás seguro de eliminar este cliente?")) return;

            fetch(apiUrl, {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idUsuario })
            })
                .then(res => res.json())
                .then(res => {
                    alert(res.message || res.error);
                    cargarClientes();
                })
                .catch(err => console.error("Error al eliminar cliente:", err));
        }

        // Búsqueda en vivo
        function buscarCliente() {
            const filtro = document.getElementById("buscarCampo").value;
            cargarClientes(filtro);
        }

        // Modal helpers
        function abrirModal() { document.getElementById("modalCliente").style.display = "flex"; }
        function cerrarModal() { document.getElementById("modalCliente").style.display = "none"; }

        // Al cargar la página
        document.addEventListener("DOMContentLoaded", () => {
            cargarClientes();
            document.getElementById("buscarCampo").addEventListener("input", buscarCliente);
        });

    </script>
    <script src="../../assets/js/navbarAdmin.js"></script>
</body>
</body>

</html>
