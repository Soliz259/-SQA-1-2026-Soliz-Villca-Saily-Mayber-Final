<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Reportes de Ventas | Pollos Express</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- AnimeJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/admin/listaVentas.css">
    <link rel="stylesheet" href="../../assets/css/admin/admin.css">
</head>

<body>

    <div class="navbar-container"></div>

    <!-- Contenido principal con tabla de ventas -->
    <div class="container mt-0">
        <h1><i class="fas fa-chart-line me-2"></i>Reportes de Ventas</h1>

        <div id="filtros" class="mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-md-4">
                    <label for="campoFiltro" class="form-label">Filtrar por:</label>
                    <select id="campoFiltro" class="form-select">
                        <option value="idVenta">ID</option>
                        <option value="Cliente">Cliente</option>
                        <option value="MetodoPago">Método Pago</option>
                        <option value="EstadoVenta">Estado</option>
                        <option value="total">Total</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="valorFiltro" class="form-label">Valor:</label>
                    <input type="text" id="valorFiltro" class="form-control" placeholder="Escribe para filtrar" />
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="window.print()">
                        <i class="fas fa-print me-2"></i>Imprimir
                    </button>
                </div>
            </div>

            <div id="fechaFiltro" class="row g-3 mt-3">
                <div class="col-md-6">
                    <label for="fechaDesde" class="form-label">Fecha desde:</label>
                    <input type="date" id="fechaDesde" class="form-control" />
                </div>

                <div class="col-md-6">
                    <label for="fechaHasta" class="form-label">Fecha hasta:</label>
                    <input type="date" id="fechaHasta" class="form-control" />
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table id="ventas" class="table table-hover">
                <thead class="table-warning">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Método Pago</th>
                        <th>Estado</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Estado de carga -->
                    <tr>
                        <td colspan="7" class="text-center py-4">
                            <div class="spinner-border text-warning" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                            <p class="mt-2">Cargando datos de ventas...</p>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="5" class="text-end">TOTAL GENERAL:</td>
                        <td id="totalGeneral">-</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script para cargar nombre del usuario logueado -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const bienvenida = document.getElementById("bienvenida");

            // 1. Consultamos la sesión activa
            fetch("/sistema/public/api/estado-sesion")
                .then(res => res.json())
                .then(data => {
                    if (!data.logeado) {
                        bienvenida.innerText = "No hay usuario logueado";
                        return;
                    }

                    const correo = data.correo;

                    // 2. Con el correo recuperado, pedimos los datos del usuario
                    return fetch("/sistema/public/api/obtener-usuario", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ correo })
                    });
                })
                .then(res => {
                    if (!res) return; // ya se manejó si no hay sesión
                    return res.json();
                })
                .then(data => {
                    if (!data) return;
                    if (data.success) {
                        const u = data.usuario;
                        bienvenida.innerText = `Bienvenido, ${u.nombre} ${u.apellido}`;
                    } else {
                        bienvenida.innerText = "Error: " + data.message;
                    }
                })
                .catch(err => {
                    bienvenida.innerText = "Error al conectar con el servidor.";
                    console.error(err);
                });
        });
        function cerrarSesion() {
            localStorage.removeItem("correoLogeado");
            location.href = "../../logout.php";
        }

    </script>


    <!-- Script para la tabla de ventas y filtros -->
    <script>
        let ventasOriginal = [];

        // Animación inicial
        anime({
            targets: '#filtros',
            scale: [0.95, 1],
            opacity: [0, 1],
            duration: 600,
            easing: 'easeOutElastic'
        });

        anime({
            targets: 'h1',
            translateX: [-20, 0],
            opacity: [0, 1],
            duration: 500,
            easing: 'easeOutExpo'
        });

        setTimeout(() => {
            fetch("/sistema/public/api/todas-las-ventas")
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.ventas) {
                        ventasOriginal = data.ventas;
                        aplicarFiltro();

                        // Animación de entrada de datos
                        anime({
                            targets: '#ventas tbody tr',
                            translateY: [20, 0],
                            opacity: [0, 1],
                            delay: anime.stagger(50),
                            easing: 'easeOutQuad'
                        });
                    } else {
                        throw new Error(data.mensaje || "Error desconocido");
                    }
                })
                .catch(error => {
                    console.error("Error al cargar ventas:", error);
                    document.querySelector('#ventas tbody').innerHTML = `
                <tr>
                  <td colspan="7" class="text-center text-danger py-4">
                    Error al cargar los datos. Intente nuevamente.
                  </td>
                </tr>
            `;
                });
        }, 1000);


        function renderizarTabla(data) {
            const tbody = document.querySelector('#ventas tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-muted py-4">
              No se encontraron ventas con los filtros aplicados
            </td>
          </tr>
        `;
                return;
            }

            data.forEach((v, index) => {
                const tr = document.createElement('tr');
                tr.style.opacity = '0';
                tr.innerHTML = `
          <td>${v.idVenta}</td>
          <td>${v.Cliente}</td>
          <td>${v.fecha}</td>
          <td>${v.MetodoPago}</td>
          <td>${v.EstadoVenta}</td>
          <td>${parseFloat(v.total).toFixed(2)}</td>
          <td><button class="btn btn-sm btn-info" onclick="ver(${v.idVenta})"><i class="fas fa-eye me-1"></i>Ver</button></td>
        `;
                tbody.appendChild(tr);

                // Animación para cada fila
                anime({
                    targets: tr,
                    opacity: [0, 1],
                    translateY: [10, 0],
                    delay: index * 50,
                    easing: 'easeOutQuad'
                });
            });
        }

        function calcularTotal(data) {
            const total = data.reduce((sum, v) => sum + parseFloat(v.total), 0);
            const totalElement = document.getElementById('totalGeneral');

            // Animación del cambio de total
            anime({
                targets: totalElement,
                scale: [1.2, 1],
                color: ['#F4A300', '#000000'],
                duration: 500,
                easing: 'easeOutExpo'
            });

            totalElement.textContent = total.toFixed(2);
        }

        function aplicarFiltro() {
            const campo = document.getElementById('campoFiltro').value;
            const valor = document.getElementById('valorFiltro').value.toLowerCase();
            const desdeStr = document.getElementById('fechaDesde').value;
            const hastaStr = document.getElementById('fechaHasta').value;

            let desde = null;
            let hasta = null;

            if (desdeStr) {
                // Desde 00:00:00 del día seleccionado
                desde = new Date(desdeStr + 'T00:00:00');
            }
            if (hastaStr) {
                // Hasta 23:59:59.999 del día seleccionado (para incluir todo el día)
                hasta = new Date(hastaStr + 'T23:59:59.999');
            }

            const filtrado = ventasOriginal.filter(v => {
                let cumpleTexto = true;
                let cumpleFecha = true;

                // Filtrado texto
                if (valor) {
                    const campoValor = (v[campo] + '').toLowerCase();
                    cumpleTexto = campoValor.includes(valor);
                }

                // Filtrado fecha
                if (desde || hasta) {
                    // Convertir fecha venta a Date
                    const fechaVenta = new Date(v.fecha);  // v.fecha ej: "2025-06-15 20:01:50"

                    if (desde) {
                        cumpleFecha = cumpleFecha && (fechaVenta >= desde);
                    }
                    if (hasta) {
                        cumpleFecha = cumpleFecha && (fechaVenta <= hasta);
                    }
                }

                return cumpleTexto && cumpleFecha;
            });

            renderizarTabla(filtrado);
            calcularTotal(filtrado);
        }


        document.getElementById('valorFiltro').addEventListener('input', aplicarFiltro);
        document.getElementById('campoFiltro').addEventListener('change', aplicarFiltro);
        document.getElementById('fechaDesde').addEventListener('change', aplicarFiltro);
        document.getElementById('fechaHasta').addEventListener('change', aplicarFiltro);

        function ver(id) {
            // Animación al hacer clic en Ver
            anime({
                targets: `button[onclick="ver(${id})"]`,
                scale: [1, 0.9, 1],
                duration: 300,
                easing: 'easeInOutQuad',
                complete: function () {
                    window.location.href = `reports/detalleVentas.html?id=${id}`;
                }
            });
        }
    </script>
    <script src="../../assets/js/navbarAdmin.js"></script>
</body>
</html>
