<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | Pollos Express</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CDN (lo mantenemos para la funcionalidad) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome (como en el primer ejemplo) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/admin/repartidoresAdmin.css">
    <link rel="stylesheet" href="../../assets/css/admin/admin.css">
</head>

<body>
    <!--Navbar reutilizable no tocar-->
    <div class="navbar-container"></div>
    <div class="main-container">
        <h2><i class="fas fa-motorcycle"></i> Gestión de Repartidores</h2>
        <button id="btnAsignarRepartidor"><i class="fas fa-user-plus"></i> Asignar Repartidor</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Teléfono</th>
                    <th>CI</th>
                    <th>Salario</th>
                    <th>Turno</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="listaRepartidores">
                <!-- Los datos se cargarán dinámicamente -->
            </tbody>
        </table>
    </div>

    <!-- Modal para asignar nuevo repartidor -->
    <div id="overlay"></div>
    <div id="modalAsignarRepartidor">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> Asignar Repartidor</h3>
        </div>
        <form id="formAsignarRepartidor" class="modal-form">
            <div class="form-group">
                <label for="idUsuario"><i class="fas fa-user"></i> Empleado:</label>
                <select id="idUsuario" name="idUsuario" required>
                    <option value="">Seleccione un empleado</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Asignar</button>
                <button type="button" id="btnCerrarModalRepartidor" class="btn-cancel"><i class="fas fa-times"></i>
                    Cancelar</button>
            </div>
        </form>
    </div>

    <!-- Modal para editar repartidor -->
    <div id="modalFondo"></div>
    <div id="modalEditar">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Editar Repartidor</h3>
        </div>
        <form id="formEditarRepartidor" class="modal-form">
            <input type="hidden" id="editIdUsuario" />

            <div class="form-group">
                <label for="editNombre"><i class="fas fa-user"></i> Nombre:</label>
                <input type="text" id="editNombre" required>
            </div>

            <div class="form-group">
                <label for="editApellido"><i class="fas fa-user-tag"></i> Apellido:</label>
                <input type="text" id="editApellido" required>
            </div>

            <div class="form-group">
                <label for="editTelefono"><i class="fas fa-phone"></i> Teléfono:</label>
                <input type="text" id="editTelefono" required>
            </div>

            <div class="form-group">
                <label for="editCi"><i class="fas fa-id-card"></i> CI:</label>
                <input type="text" id="editCi" required>
            </div>

            <div class="form-group">
                <label for="editSalario"><i class="fas fa-money-bill-wave"></i> Salario:</label>
                <input type="number" step="0.01" id="editSalario" required>
            </div>

            <div class="form-group">
                <label for="editIdTurno"><i class="fas fa-clock"></i> Turno:</label>
                <select id="editIdTurno" required>
                    <option value="">-- Seleccionar turno --</option>
                    <option value="1">Mañana</option>
                    <option value="2">Tarde</option>
                </select>
            </div>

            <!-- Inputs ocultos -->
            <input type="hidden" id="editIdVehiculoTipo" value="">
            <input type="hidden" id="editIdEstadoRepartidor" value="">
            <input type="hidden" id="editPlacaVehiculo" value="">
            <input type="hidden" id="editUltimaLatitud" value="">
            <input type="hidden" id="editUltimaLongitud" value="">
            <div class="form-actions">
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Guardar</button>
                <button type="button" onclick="cerrarModal()" class="btn-cancel"><i class="fas fa-times"></i>
                    Cancelar</button>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Scripts (se mantienen igual) -->
    <script>
        async function cargarListaRepartidores() {
            const response = await fetch('/sistema/public/api/repartidores');
            const repartidores = await response.json();

            const tbody = document.getElementById('listaRepartidores');
            tbody.innerHTML = ''; // Limpiar tabla

            repartidores.forEach(rep => {
                const row = document.createElement('tr');

                row.innerHTML = `
            <td>${rep.idUsuario}</td>
            <td>${rep.nombre}</td>
            <td>${rep.apellido}</td>
            <td>${rep.telefono}</td>
            <td>${rep.ci}</td>
            <td>${rep.salario}</td>
            <td>${rep.idTurno == 1 ? 'mañana' : rep.idTurno == 2 ? 'tarde' : ''}</td>
            <td>${rep.estadoRepartidor}</td>
            <td><button class="btn-action btn-edit" onclick='editarRepartidor(${JSON.stringify(rep)})'><i class="fas fa-edit"></i> Editar</button></td>`;
                tbody.appendChild(row);
            });
        }

        // Mostrar modal
        function mostrarModal() {
            document.getElementById('modalEditar').style.display = 'block';
            document.getElementById('modalFondo').style.display = 'block';
        }

        // Ocultar modal
        function cerrarModal() {
            document.getElementById('modalEditar').style.display = 'none';
            document.getElementById('modalFondo').style.display = 'none';
        }
        function cerrarSesion() {
            localStorage.removeItem("correoLogeado");
            location.href = "../../logout.php";
        }


        // Cargar datos en el modal y mostrarlo
        function editarRepartidor(rep) {
            document.getElementById('editIdUsuario').value = rep.idUsuario;
            document.getElementById('editNombre').value = rep.nombre || '';
            document.getElementById('editApellido').value = rep.apellido || '';
            document.getElementById('editTelefono').value = rep.telefono || '';
            document.getElementById('editCi').value = rep.ci || '';
            document.getElementById('editSalario').value = rep.salario || '';
            document.getElementById('editIdTurno').value = rep.idTurno ?? '';

            // Asignar valores a inputs ocultos (si existen datos)
            document.getElementById('editIdVehiculoTipo').value = rep.idVehiculoTipo ?? '';
            document.getElementById('editIdEstadoRepartidor').value = rep.idEstadoRepartidor ?? '';
            document.getElementById('editPlacaVehiculo').value = rep.placaVehiculo ?? '';
            document.getElementById('editUltimaLatitud').value = rep.ultimaLatitud ?? '';
            document.getElementById('editUltimaLongitud').value = rep.ultimaLongitud ?? '';

            mostrarModal();
        }

        // Enviar formulario para actualizar repartidor
        document.getElementById('formEditarRepartidor').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                nombre: document.getElementById('editNombre').value,
                apellido: document.getElementById('editApellido').value,
                telefono: document.getElementById('editTelefono').value,
                ci: document.getElementById('editCi').value,
                salario: parseFloat(document.getElementById('editSalario').value),
                idTurno: parseInt(document.getElementById('editIdTurno').value),

                // Campos ocultos para evitar Bad Request
                idVehiculoTipo: parseInt(document.getElementById('editIdVehiculoTipo').value) || 2,
                idEstadoRepartidor: parseInt(document.getElementById('editIdEstadoRepartidor').value) || 1,
                placaVehiculo: document.getElementById('editPlacaVehiculo').value || '',
                ultimaLatitud: document.getElementById('editUltimaLatitud').value || '',
                ultimaLongitud: document.getElementById('editUltimaLongitud').value || ''
            };

            const idUsuario = document.getElementById('editIdUsuario').value;

            const res = await fetch(`/sistema/public/api/repartidores?idUsuario=${idUsuario}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('Repartidor actualizado.');
                cerrarModal();
                cargarListaRepartidores(); // actualiza tabla
            } else {
                const error = await res.json();
                alert('Error: ' + (error.error || 'No se pudo actualizar.'));
            }
        });

        window.addEventListener('DOMContentLoaded', cargarListaRepartidores);
    </script>

    <script>
        // Elementos del DOM
        const btnAsignarRepartidor = document.getElementById('btnAsignarRepartidor');
        const modalAsignarRepartidor = document.getElementById('modalAsignarRepartidor');
        const btnCerrarModalRepartidor = document.getElementById('btnCerrarModalRepartidor');
        const overlay = document.getElementById('overlay');
        const formAsignarRepartidor = document.getElementById('formAsignarRepartidor');

        // Función para abrir el modal
        function abrirModalAsignarRepartidor() {
            modalAsignarRepartidor.style.display = 'block';
            overlay.style.display = 'block';
        }

        // Función para cerrar el modal
        function cerrarModalAsignarRepartidor() {
            modalAsignarRepartidor.style.display = 'none';
            overlay.style.display = 'none';
            formAsignarRepartidor.reset();
        }

        // Evento: abrir modal al hacer click en botón asignar
        btnAsignarRepartidor.addEventListener('click', () => {
            cargarEmpleadosDisponibles();
            abrirModalAsignarRepartidor();
        });

        // Evento: cerrar modal al hacer click en botón cancelar o en el overlay
        btnCerrarModalRepartidor.addEventListener('click', cerrarModalAsignarRepartidor);
        overlay.addEventListener('click', cerrarModalAsignarRepartidor);

        // Enviar formulario para asignar repartidor
        formAsignarRepartidor.addEventListener('submit', async function (e) {
            e.preventDefault();

            const idUsuario = document.getElementById("idUsuario").value;

            const response = await fetch('/sistema/public/api/repartidores', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    idUsuario: idUsuario
                })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                alert("Repartidor asignado exitosamente.");
                cerrarModalAsignarRepartidor();
                cargarListaRepartidores();
            } else {
                alert(data.error || "Error al asignar repartidor.");
            }
        });

        // Cargar empleados disponibles para asignar
        async function cargarEmpleadosDisponibles() {
            const response = await fetch('/sistema/public/api/empleados-disponibles'); // Define esta ruta en tu backend
            const empleados = await response.json();

            const select = document.getElementById('idUsuario');
            select.innerHTML = '';

            empleados.forEach(emp => {
                const option = document.createElement('option');
                option.value = emp.idUsuario;
                option.textContent = `${emp.nombre} ${emp.apellido} - CI: ${emp.ci}`;
                select.appendChild(option);
            });
        }
    </script>
    <script src="../../assets/js/navbarAdmin.js"></script>
</body>

</html>
