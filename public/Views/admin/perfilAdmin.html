<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | Pollos Express</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CDN (lo mantenemos para la funcionalidad) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome (como en el primer ejemplo) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/admin/perfilAdmin.css">
    <link rel="stylesheet" href="../../assets/css/admin/admin.css">
</head>

<body>
    <!--Navbar reutilizable no tocar-->
    <div class="navbar-container"></div>

    <!-- Main Content -->
    <main class="container-main">
        <!-- User summary -->
        <div id="user-summary">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar" />
            <div class="info">
                <label for="nombreCompletoSummary">Nombre Completo</label>
                <input type="text" id="nombreCompletoSummary" placeholder="Nombre completo" readonly/>
                <label for="correoSummary">Correo Electrónico</label>
                <input type="email" id="correoSummary" placeholder="Correo electrónico" readonly/>
                <label for="rolSummary">Rol</label>
                <input type="text" id="rolSummary" placeholder="Rol" readonly/>
            </div>
        </div>

        <!-- Card de perfil -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">Perfil de Usuario</h4>
            </div>
            <div class="card-body">
                <form id="perfilForm">
                    <div class="mb-3 row">
                        <label for="nombreCompleto" class="col-sm-3 col-form-label">Nombre completo</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="nombreCompleto" disabled readonly />
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="telefono" class="col-sm-3 col-form-label">Teléfono</label>
                        <div class="col-sm-9">
                            <input type="tel" class="form-control" id="telefono" disabled readonly/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="ci" class="col-sm-3 col-form-label">Cédula de Identidad</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control" id="ci" disabled readonly/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="salario" class="col-sm-3 col-form-label">Salario (Bs)</label>
                        <div class="col-sm-9">
                            <input type="number" step="0.01" class="form-control" id="salario" disabled readonly/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="fechaContratacion" class="col-sm-3 col-form-label">Fecha de Contratación</label>
                        <div class="col-sm-9">
                            <input type="date" class="form-control" id="fechaContratacion" disabled readonly/>
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label for="estado" class="col-sm-3 col-form-label">Estado</label>
                        <div class="col-sm-9">
                            <input type="text" readonly class="form-control-plaintext" id="estado" />
                        </div>
                    </div>


                    <div class="d-flex justify-content-end mt-4">
                        <button type="button" id="btnCerrarSesion" class="btn btn-danger" onclick="cerrarSesion()">
                            <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Scripts (se mantienen igual) -->
    <script>

        function cerrarSesion() {
            localStorage.removeItem("correoLogeado");
            location.href = "../../logout.php";
        }
        fetch("/sistema/public/estadoSesion.php")
            .then(res => res.json())
            .then(data => {
                if (!data.logeado) {
                    alert("Sesión no iniciada.");
                    location.href = "/login.php";  // ruta absoluta desde raíz
                } else {
                    console.log("Usuario logeado:", data.correo);
                }
            })
            .catch(() => {
                alert("Error al verificar sesión.");
                location.href = "/sistema/public/login.php";  // ruta absoluta también aquí
            });

        document.addEventListener('DOMContentLoaded', function () {
            const bienvenida = document.getElementById("bienvenida");

            // Paso 1: Obtener estado de sesión (y el correo)
            fetch("/sistema/public/api/estado-sesion")
                .then(res => res.json())
                .then(data => {
                    if (!data.logeado) {
                        bienvenida.innerText = "No hay usuario logueado.";
                        location.href = "/sistema/public/login.php";
                        return;
                    }
                    const correo = data.correo;
                    // Paso 2: Usar el correo en obtener-usuario
                    return fetch("/sistema/public/api/obtener-usuario", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ correo })
                    });
                })
                .then(res => {
                    if (!res) return;
                    return res.json();
                })
                .then(data => {
                    if (!data || !data.success) {
                        alert("No se pudo obtener los datos del usuario.");
                        location.href = "/sistema/public/login.php";
                        return;
                    }
                    const u = data.usuario;
                    const nombreCompleto = `${u.nombre} ${u.apellido}`;
                    document.getElementById("bienvenida").innerText = `Bienvenido, ${nombreCompleto}`;
                    document.getElementById("nombreCompletoSummary").value = nombreCompleto;
                    document.getElementById("correoSummary").value = u.correo;
                    document.getElementById("rolSummary").value = u.rol;
                    document.getElementById("nombreCompleto").value = nombreCompleto;
                    document.getElementById("telefono").value = u.telefono ?? "";
                    document.getElementById("ci").value = u.ci ?? "";
                    document.getElementById("salario").value = u.salario !== null ? u.salario : "";
                    if (u.fechaContratacion) {
                        const f = new Date(u.fechaContratacion);
                        document.getElementById("fechaContratacion").value = f.toISOString().split("T")[0];
                    } else {
                        document.getElementById("fechaContratacion").value = "";
                    }
                    document.getElementById("estado").value = u.estado ?? "";
                })
                .catch(err => {
                    console.error(err);
                    alert("Error al conectar con el servidor.");
                    location.href = "/sistema/public/login.php";
                });
        });
    </script>
    <script src="../../assets/js/navbarAdmin.js"></script>
</body>
</html>
